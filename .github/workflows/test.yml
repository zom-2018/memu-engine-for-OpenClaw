name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MEMU_MEMORY_ROOT: /tmp/memu-test
  MEMU_DATA_DIR: /tmp/memu-data
  OPENAI_API_KEY: mock-key-for-testing
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('python/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f python/requirements.txt ]; then
            pip install -r python/requirements.txt
          else
            pip install -e ./python
          fi
          pip install pytest pytest-cov

      - name: Run pytest with coverage
        run: |
          cd python
          pytest tests/ -v --tb=short -o console_output_style=progress -m "not perf and not acceptance and not migration" -p pytest_cov --cov=src/memu --cov-report=xml

      - name: Upload Python coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ matrix.python-version }}
          path: python/coverage.xml
          if-no-files-found: error

  typescript-tests:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install

      - name: Run npm test
        env:
          MEMU_MEMORY_ROOT: /tmp/memu-test
        run: npm test

      - name: Run coverage
        env:
          MEMU_MEMORY_ROOT: /tmp/memu-test
        run: npm run test:coverage

      - name: Upload TypeScript coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: typescript-coverage
          path: coverage/
          if-no-files-found: error
